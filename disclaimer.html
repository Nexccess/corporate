<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="robots" content="noindex">
<title>免責事項 | Path-Flow for 経営者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:             #0d1117;
  --bg-card:        #161b22;
  --border:         rgba(180,210,240,0.1);
  --border-active:  rgba(180,210,240,0.32);
  --gold:           #c8a45a;
  --gold-light:     #e0c07a;
  --gold-dim:       rgba(200,164,90,0.28);
  --text-primary:   #eef4fa;
  --text-secondary: #8da8c0;
  --text-muted:     #4a6880;
  --serif:   'Noto Serif JP', serif;
  --display: 'Cormorant Garamond', serif;
  --sans:    'Noto Sans JP', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--serif);
  font-weight: 300;
  line-height: 1.8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 8%,  rgba(40,80,140,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 85% 85%, rgba(25,55,100,0.1)  0%, transparent 55%),
    linear-gradient(rgba(140,180,220,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(140,180,220,0.018) 1px, transparent 1px);
  background-size: auto, auto, 72px 72px, 72px 72px;
  pointer-events:none;
  z-index:-1;
}
nav {
  height:64px;
  display:flex; align-items:center;
  padding:0 48px;
  border-bottom:1px solid var(--border);
  background:rgba(10,14,20,0.97);
  backdrop-filter:blur(12px);
}
.nav-logo {
  font-family:var(--display);
  font-size:13px; letter-spacing:0.35em;
  color:var(--gold); text-decoration:none;
  text-transform:uppercase;
}
main {
  flex:1;
  max-width:760px;
  width:100%;
  margin:0 auto;
  padding:64px 40px 80px;
}
.page-tag {
  font-family:var(--display); font-size:11px; letter-spacing:0.42em;
  color:var(--gold); text-transform:uppercase; margin-bottom:16px;
}
.page-title {
  font-family:var(--serif); font-size:clamp(22px, 3.5vw, 30px); font-weight:400;
  color:var(--text-primary); line-height:1.6;
  margin-bottom:36px; padding-bottom:28px;
  border-bottom:1px solid var(--border);
}
.page-body {
  font-family:var(--serif); font-size:15px; font-weight:300;
  color:var(--text-primary); line-height:2.3; white-space:pre-line;
  margin-bottom:64px;
}
.back-link {
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--sans); font-size:12px; font-weight:300;
  letter-spacing:0.12em; color:var(--gold);
  text-decoration:none; border:1px solid var(--gold-dim);
  padding:12px 28px; transition:border-color 0.25s ease, background 0.25s ease;
}
.back-link:hover { border-color:var(--gold); background:rgba(200,164,90,0.08); }
footer {
  border-top:1px solid var(--border);
  padding:28px 48px;
  font-family:var(--sans); font-size:11px; font-weight:300;
  color:var(--text-muted); text-align:center;
}
@media (max-width:768px) {
  nav { padding:0 20px; }
  main { padding:48px 20px 60px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Path-Flow / Keiei</a>
</nav>

<main>
  <div class="page-tag">Disclaimer</div>
  <h1 class="page-title">免責事項</h1>
  <div class="page-body">本サイトおよびAI診断ツールにより提供される情報は、経営状況の一次整理を目的とした参考情報であり、法的・財務的・経営上の助言や判断の根拠となるものではありません。

本サイトに掲載する情報は、予告なく変更・削除されることがあります。</div>

</main>

<footer>
  © 2025 合同会社Nexccess. All Rights Reserved.
</footer>

</body>
</html>
